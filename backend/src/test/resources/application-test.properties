spring.datasource.url=jdbc:h2:mem:fundkeeper;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.data.redis.repositories.enabled=false
management.health.redis.enabled=false

fundkeeper.auth.email-code-store=memory
fundkeeper.auth.login-attempt-store=memory
fundkeeper.auth.mail-sender=memory
fundkeeper.auth.jwt-secret-base64=YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
fundkeeper.auth.verification-secret-base64=YmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmJiYmI=
fundkeeper.valuation.cache-store=memory
fundkeeper.valuation.page-index-store=memory
