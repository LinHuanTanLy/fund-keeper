spring.application.name=fund-keeper-backend

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fund_keeper?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:fund_keeper}
spring.datasource.password=${DB_PASSWORD:fund_keeper}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.repositories.enabled=false

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:false}

management.endpoints.web.exposure.include=health,info

fundkeeper.auth.issuer=${AUTH_ISSUER:fund-keeper}
fundkeeper.auth.audience=${AUTH_AUDIENCE:fund-keeper-app}
fundkeeper.auth.jwt-secret-base64=${AUTH_JWT_SECRET_BASE64:}
fundkeeper.auth.verification-secret-base64=${AUTH_VERIFICATION_SECRET_BASE64:}
fundkeeper.auth.access-token-ttl=${AUTH_ACCESS_TOKEN_TTL:30m}
fundkeeper.auth.refresh-token-ttl=${AUTH_REFRESH_TOKEN_TTL:30d}
fundkeeper.auth.verification-code-ttl=${AUTH_VERIFICATION_CODE_TTL:10m}
fundkeeper.auth.verification-code-cooldown=${AUTH_VERIFICATION_CODE_COOLDOWN:1m}
fundkeeper.auth.verification-code-max-attempts=${AUTH_VERIFICATION_CODE_MAX_ATTEMPTS:5}
fundkeeper.auth.login-attempt-window=${AUTH_LOGIN_ATTEMPT_WINDOW:15m}
fundkeeper.auth.login-block-duration=${AUTH_LOGIN_BLOCK_DURATION:15m}
fundkeeper.auth.login-max-attempts=${AUTH_LOGIN_MAX_ATTEMPTS:5}
fundkeeper.auth.email-code-store=${AUTH_EMAIL_CODE_STORE:redis}
fundkeeper.auth.login-attempt-store=${AUTH_LOGIN_ATTEMPT_STORE:redis}
fundkeeper.auth.mail-sender=${AUTH_MAIL_SENDER:smtp}
fundkeeper.auth.mail-from=${AUTH_MAIL_FROM:no-reply@fund-keeper.local}

# 基金参考数据默认关闭。Tushare 仅用于已获授权的个人/开发场景。
fundkeeper.reference-data.provider=${FUND_REFERENCE_DATA_PROVIDER:none}
fundkeeper.reference-data.sync-on-startup=${FUND_REFERENCE_DATA_SYNC_ON_STARTUP:false}
fundkeeper.reference-data.fund-codes=${FUND_REFERENCE_DATA_FUND_CODES:}
fundkeeper.reference-data.nav-lookback-days=${FUND_REFERENCE_DATA_NAV_LOOKBACK_DAYS:10}
fundkeeper.reference-data.calendar-history-days=${FUND_REFERENCE_DATA_CALENDAR_HISTORY_DAYS:30}
fundkeeper.reference-data.calendar-future-days=${FUND_REFERENCE_DATA_CALENDAR_FUTURE_DAYS:400}
fundkeeper.reference-data.tushare-base-url=${TUSHARE_BASE_URL:https://api.tushare.pro}
fundkeeper.reference-data.tushare-token=${TUSHARE_TOKEN:}
fundkeeper.reference-data.eastmoney-base-url=${EASTMONEY_BASE_URL:https://fund.eastmoney.com}
fundkeeper.reference-data.sse-closed-days-url=${SSE_CLOSED_DAYS_URL:https://www.sse.com.cn/disclosure/dealinstruc/closed/}
fundkeeper.reference-data.connect-timeout=${FUND_REFERENCE_DATA_CONNECT_TIMEOUT:5s}
fundkeeper.reference-data.read-timeout=${FUND_REFERENCE_DATA_READ_TIMEOUT:20s}
fundkeeper.reference-data.schedule.enabled=${FUND_REFERENCE_DATA_SCHEDULE_ENABLED:false}
fundkeeper.reference-data.schedule.daily-nav-cron=${FUND_REFERENCE_DATA_DAILY_NAV_CRON:0 30 20 * * MON-FRI}
fundkeeper.reference-data.schedule.full-refresh-cron=${FUND_REFERENCE_DATA_FULL_REFRESH_CRON:0 0 6 * * SAT}
fundkeeper.reference-data.schedule.zone=${FUND_REFERENCE_DATA_SCHEDULE_ZONE:Asia/Shanghai}
fundkeeper.reference-data.schedule.lock-at-most-for=${FUND_REFERENCE_DATA_LOCK_AT_MOST_FOR:10m}

# 盘中估值默认关闭；eastmoney-public 仅用于个人学习和开发验证。
fundkeeper.valuation.provider=${FUND_VALUATION_PROVIDER:none}
fundkeeper.valuation.refresh-enabled=${FUND_VALUATION_REFRESH_ENABLED:false}
fundkeeper.valuation.refresh-delay-ms=${FUND_VALUATION_REFRESH_DELAY_MS:60000}
fundkeeper.valuation.initial-delay-ms=${FUND_VALUATION_INITIAL_DELAY_MS:10000}
fundkeeper.valuation.fund-codes=${FUND_VALUATION_FUND_CODES:}
fundkeeper.valuation.delayed-after=${FUND_VALUATION_DELAYED_AFTER:90s}
fundkeeper.valuation.stale-after=${FUND_VALUATION_STALE_AFTER:3m}
fundkeeper.valuation.cache-ttl=${FUND_VALUATION_CACHE_TTL:30m}
fundkeeper.valuation.index-ttl=${FUND_VALUATION_INDEX_TTL:24h}
fundkeeper.valuation.request-delay=${FUND_VALUATION_REQUEST_DELAY:300ms}
fundkeeper.valuation.connect-timeout=${FUND_VALUATION_CONNECT_TIMEOUT:5s}
fundkeeper.valuation.read-timeout=${FUND_VALUATION_READ_TIMEOUT:30s}
fundkeeper.valuation.lock-at-most-for=${FUND_VALUATION_LOCK_AT_MOST_FOR:55s}
fundkeeper.valuation.target-page-size=${FUND_VALUATION_TARGET_PAGE_SIZE:1000}
fundkeeper.valuation.full-page-size=${FUND_VALUATION_FULL_PAGE_SIZE:30000}
fundkeeper.valuation.max-pages-per-refresh=${FUND_VALUATION_MAX_PAGES_PER_REFRESH:10}
fundkeeper.valuation.eastmoney-api-base-url=${FUND_VALUATION_EASTMONEY_API_BASE_URL:https://api.fund.eastmoney.com}
fundkeeper.valuation.eastmoney-referer=${FUND_VALUATION_EASTMONEY_REFERER:https://fund.eastmoney.com/fundguzhi5.html}
fundkeeper.valuation.zone=${FUND_VALUATION_ZONE:Asia/Shanghai}
fundkeeper.valuation.cache-store=${FUND_VALUATION_CACHE_STORE:redis}
fundkeeper.valuation.page-index-store=${FUND_VALUATION_PAGE_INDEX_STORE:redis}
